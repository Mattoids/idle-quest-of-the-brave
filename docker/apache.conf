# 勇者挂机传说 · Apache vhost 配置
#
# 路径划分：
#   /                              → 前端静态资源（index.html / js / css / dist）
#   /game/idle-quest-of-the-brave/*  → PHP 后端（server/public/index.php 路由分发）
#
# 注意 Request::fromGlobals 内会剥离 /game/idle-quest-of-the-brave 前缀，
# 所以后端代码里所有路由都是 /auth/login、/save 等"裸路径"。

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # 前端静态资源目录
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted

        # 静态资源缓存（开发期可注释）
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css         "access plus 1 hour"
            ExpiresByType application/javascript "access plus 1 hour"
            ExpiresByType image/png        "access plus 1 day"
            ExpiresByType image/jpeg       "access plus 1 day"
        </IfModule>
    </Directory>

    # 屏蔽对 server/data 等敏感目录的直接访问
    <DirectoryMatch "^/var/www/html/server/(data|config|src|migrations)">
        Require all denied
    </DirectoryMatch>

    # ---- 后端 API 路由 ----
    # /game/idle-quest-of-the-brave/* → server/public/index.php
    Alias /game/idle-quest-of-the-brave /var/www/html/server/public

    <Directory /var/www/html/server/public>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        # 任何不是真实文件 / 目录的请求都打到 index.php 由 Router 分发
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [L]
        </IfModule>

        DirectoryIndex index.php
    </Directory>

    # ---- 日志 ----
    ErrorLog ${APACHE_LOG_DIR}/iqotb-error.log
    CustomLog ${APACHE_LOG_DIR}/iqotb-access.log combined
</VirtualHost>
