# 勇者挂机传说 · Nginx 网关配置
#
# 用途：作为 docker-compose 中的入口网关，提供：
#   1. 前端静态资源直出（nginx 比 Apache 更轻量高效）
#   2. 后端 API 反向代理到 web 容器（Apache + PHP）
#   3. 静态资源缓存 + 敏感目录屏蔽
#
# 部署方式：
#   docker compose up -d
#   - http://localhost       → nginx 入口（推荐）
#   - http://localhost:8080  → 直连 Apache（调试用）

server {
    listen 80;
    server_name localhost;

    # 前端静态资源根目录
    root /var/www/html;
    index index.html;

    # ---- 前端静态资源 ----
    # nginx 直接服务 index.html / css / js / 图片，不经过 Apache
    location / {
        try_files $uri $uri/ =404;

        # HTML 不缓存（避免发布新版后客户端仍用旧版）
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires off;
        }
    }

    # ---- 后端 API ----
    # /game/idle-quest-of-the-brave/* 转发给 web 容器的 Apache/PHP
    location /game/idle-quest-of-the-brave/ {
        proxy_pass http://web:80;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 避免 nginx 缓冲导致 SSE/流式响应延迟（预留，目前未使用）
        proxy_buffering off;

        # 长连接保持
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ---- 安全：屏蔽敏感目录 ----
    location ~ ^/(server|docker)/ {
        deny all;
        return 403;
    }

    # ---- 静态资源缓存 ----
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
